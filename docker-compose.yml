services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-todo-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo}
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - todo-network

  kafka:
    image: apache/kafka:3.9.0
    container_name: ${KAFKA_CONTAINER_NAME:-todo-kafka}
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_PORT:-9094}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "${KAFKA_PORT:-9094}:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - todo-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ${BACKEND_CONTAINER_NAME:-todo-backend}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-todo}
      JDBC_USER: ${POSTGRES_USER:-todo}
      JDBC_PASSWORD: ${POSTGRES_PASSWORD:-todo}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TASK_EVENTS_TOPIC: ${TASK_EVENTS_TOPIC:-task-events}
      TASK_EVENTS_GROUP_ID: ${TASK_EVENTS_GROUP_ID:-todo-task-events}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-8080}/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - todo-network

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-todo-postgres-data}
  kafka_data:
    name: ${KAFKA_VOLUME_NAME:-todo-kafka-data}

networks:
  todo-network:
    name: ${DOCKER_NETWORK_NAME:-todo-network}
    driver: bridge
